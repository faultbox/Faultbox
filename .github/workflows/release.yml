name: Release

on:
  push:
    tags:
      - "release-*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build faultbox
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#release-}
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o faultbox ./cmd/faultbox/

      - name: Build faultbox-shim (Linux only)
        if: matrix.goos == 'linux'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#release-}
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o faultbox-shim ./cmd/faultbox-shim/

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#release-}
          PLATFORM=${{ matrix.goos }}-${{ matrix.goarch }}
          ARCHIVE="faultbox-${VERSION}-${PLATFORM}.tar.gz"

          mkdir -p dist
          cp faultbox dist/
          if [ -f faultbox-shim ]; then
            cp faultbox-shim dist/
          fi
          cp LICENSE README.md dist/

          cd dist
          tar czf "../${ARCHIVE}" .
          cd ..

          # Generate checksum
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: faultbox-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            faultbox-*.tar.gz
            faultbox-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums file
        run: |
          cat *.sha256 > checksums.txt

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#release-}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            faultbox-*.tar.gz
            faultbox-*.tar.gz.sha256
            checksums.txt

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#release-}" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: faultbox-linux-*
          merge-multiple: true

      - name: Extract binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}

          mkdir -p build/linux-amd64 build/linux-arm64

          tar xzf faultbox-${VERSION}-linux-amd64.tar.gz -C build/linux-amd64
          tar xzf faultbox-${VERSION}-linux-arm64.tar.gz -C build/linux-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/faultbox/faultbox:${{ steps.version.outputs.version }}
            ghcr.io/faultbox/faultbox:latest
