name: Release

on:
  push:
    tags:
      - "release-*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build faultbox
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#release-}
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o faultbox ./cmd/faultbox/

      - name: Build faultbox-shim (Linux only)
        if: matrix.goos == 'linux'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#release-}
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o faultbox-shim ./cmd/faultbox-shim/

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#release-}
          PLATFORM=${{ matrix.goos }}-${{ matrix.goarch }}
          ARCHIVE="faultbox-${VERSION}-${PLATFORM}.tar.gz"

          mkdir -p dist
          cp faultbox dist/
          if [ -f faultbox-shim ]; then
            cp faultbox-shim dist/
          fi
          cp LICENSE README.md dist/

          cd dist
          tar czf "../${ARCHIVE}" .
          cd ..

          # Generate checksum
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: faultbox-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            faultbox-*.tar.gz
            faultbox-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums file
        run: |
          cat *.sha256 > checksums.txt

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#release-}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            faultbox-*.tar.gz
            faultbox-*.tar.gz.sha256
            checksums.txt
