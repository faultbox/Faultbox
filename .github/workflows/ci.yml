name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit + integration, excluding testops)
        run: go test $(go list ./... | grep -v '/testops$') -race -count=1

      # Builds poc service binaries to /tmp for the Linux-only poc_*
      # corpus cases. Safe to run even while those cases are still
      # Skip:'d — the build is cheap and keeps the infra warm.
      - name: Build poc binaries for testops
        run: make testops-prep

      # Experiment for issue #57 — Ubuntu 24.04's AppArmor default
      # restricts processes inside unprivileged user namespaces, which
      # breaks faultbox's service sandbox on GitHub-hosted runners.
      # If this makes poc_example pass, the hypothesis is confirmed
      # and this becomes a documented CI prerequisite (pending a
      # proper per-service `namespaces=` kwarg).
      - name: Relax AppArmor userns restriction (experiment for #57)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Testops goldens
        run: go test ./testops/... -race -count=1 -v

      - name: Cross-compile (linux/arm64)
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o /dev/null ./cmd/faultbox/
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o /dev/null ./cmd/faultbox-shim/
