name: 'Faultbox Test'
description: 'Run fault injection tests with Faultbox'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  spec:
    description: 'Path to .star spec file'
    required: true
  test:
    description: 'Run only this test (optional)'
    required: false
  runs:
    description: 'Number of runs per test (optional)'
    required: false
  version:
    description: 'Faultbox version (default: latest)'
    required: false
    default: 'latest'
  format:
    description: 'Output format: json or text (default: json)'
    required: false
    default: 'json'

outputs:
  result:
    description: 'Test result: pass or fail'
    value: ${{ steps.test.outputs.result }}
  json:
    description: 'JSON test results'
    value: ${{ steps.test.outputs.json }}
  passed:
    description: 'Number of passed tests'
    value: ${{ steps.test.outputs.passed }}
  failed:
    description: 'Number of failed tests'
    value: ${{ steps.test.outputs.failed }}

runs:
  using: 'composite'
  steps:
    - name: Install Faultbox
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          curl -fsSL https://faultbox.dev/install.sh | FAULTBOX_DIR=/usr/local/bin sh
        else
          FAULTBOX_VERSION=${{ inputs.version }} curl -fsSL https://faultbox.dev/install.sh | FAULTBOX_DIR=/usr/local/bin sh
        fi
        faultbox --version

    - name: Run tests
      id: test
      shell: bash
      run: |
        ARGS="--format ${{ inputs.format }}"
        if [ -n "${{ inputs.test }}" ]; then
          ARGS="$ARGS --test ${{ inputs.test }}"
        fi
        if [ -n "${{ inputs.runs }}" ]; then
          ARGS="$ARGS --runs ${{ inputs.runs }}"
        fi

        set +e
        OUTPUT=$(faultbox test ${{ inputs.spec }} $ARGS 2>/tmp/faultbox-stderr.txt)
        EXIT_CODE=$?
        set -e

        # Save JSON output.
        echo "$OUTPUT" > /tmp/faultbox-results.json

        # Extract summary.
        if [ "${{ inputs.format }}" = "json" ] && command -v python3 >/dev/null 2>&1; then
          PASSED=$(echo "$OUTPUT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('pass',0))" 2>/dev/null || echo "0")
          FAILED=$(echo "$OUTPUT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('fail',0))" 2>/dev/null || echo "0")
        else
          PASSED="?"
          FAILED="?"
        fi

        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "json<<FAULTBOX_EOF" >> $GITHUB_OUTPUT
        echo "$OUTPUT" >> $GITHUB_OUTPUT
        echo "FAULTBOX_EOF" >> $GITHUB_OUTPUT

        if [ $EXIT_CODE -eq 0 ]; then
          echo "result=pass" >> $GITHUB_OUTPUT
          echo "::notice::Faultbox: $PASSED passed, $FAILED failed"
        else
          echo "result=fail" >> $GITHUB_OUTPUT
          echo "::error::Faultbox: $PASSED passed, $FAILED failed"
        fi

        # Print human-readable stderr.
        cat /tmp/faultbox-stderr.txt >&2

        exit $EXIT_CODE

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: faultbox-results
        path: /tmp/faultbox-results.json
        retention-days: 30
